<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Swit RP | Advanced Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --blue: #0084ff; --bg: #030712; --card: #0b0f1a; --border: rgba(255,255,255,0.08); --red: #ff4757; }
        * { margin:0; padding:0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; }

        #authScreen { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid var(--border); width: 350px; text-align: center; }
        
        #profileScreen { display: none; padding: 50px; }
        .data-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .data-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); background: #161b22; color: white; }
        .btn { cursor: pointer; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 800; width: 100%; margin-top: 10px; transition: 0.3s; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-discord { background: #5865F2; color: white; }
        
        .label { color: #64748b; font-size: 0.7rem; text-transform: uppercase; font-weight: 800; }
        .value { font-size: 1.1rem; margin-top: 5px; }
    </style>
</head>
<body>

<div id="authScreen">
    <div class="auth-card">
        <h2>SWIT <span style="color:var(--blue)">RP</span></h2>
        <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 20px;">Sistem de Gestiune Cont</p>
        <input type="text" id="userIn" placeholder="Utilizator">
        <input type="password" id="passIn" placeholder="Parolă">
        <button class="btn btn-blue" onclick="handleAuth('login')">LOGIN</button>
        <button class="btn" onclick="handleAuth('register')" style="background:none; color:var(--blue)">CREEAZĂ CONT NOU</button>
    </div>
</div>

<div id="profileScreen">
    <div style="max-width: 1200px; margin: 0 auto;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h1 id="welcomeTxt">Profil</h1>
            <button class="btn" onclick="logout()" style="width:auto; background:var(--red); color:white;">LOGOUT</button>
        </div>

        <div class="data-grid">
            <div class="data-card">
                <div class="label">Nume FiveM</div>
                <div class="value" id="d-fivem-name">-</div>
            </div>
            <div class="data-card">
                <div class="label">ID Server</div>
                <div class="value" id="d-fivem-id">#0</div>
            </div>
            <div class="data-card">
                <div class="label">Bani (Cash/Bank)</div>
                <div class="value" id="d-money">0 / 0</div>
            </div>
            <div class="data-card">
                <div class="label">Discord</div>
                <div class="value" id="d-discord">-</div>
                <button id="discordBtn" class="btn btn-discord" onclick="linkDiscord()">LINK DISCORD</button>
            </div>
            <div class="data-card" style="border-color: var(--red)">
                <div class="label" style="color:var(--red)">IP Adress</div>
                <div class="value" id="d-ip">0.0.0.0</div>
            </div>
            <div class="data-card" style="border-color: var(--red)">
                <div class="label" style="color:var(--red)">HWID</div>
                <div class="value" id="d-hwid">N/A</div>
            </div>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://xdbdgfnrpglcqsguvcrz.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkYmRnZm5ycGdsY3FzZ3V2Y3J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTc2OTMsImV4cCI6MjA4Nzg3MzY5M30.NWjbjlP2p3wf0XmaEI2HjlgaIR3WNBYhkA5qvquv3aQ';
    const CLIENT_ID = '1475937365087486022';
    
    const sb = supabase.createClient(S_URL, S_KEY);
    let sessionUser = null;

    async function handleAuth(type) {
        const u = document.getElementById('userIn').value;
        const p = document.getElementById('passIn').value;

        if(!u || !p) return alert("Completează ambele câmpuri!");

        if(type === 'register') {
            const { error } = await sb.from('users').insert([{ username: u, password: p }]);
            if(error) {
                console.error(error);
                alert("Eroare la înregistrare: " + error.message);
            } else {
                alert("Cont creat cu succes! Acum te poți loga.");
            }
        } else {
            const { data, error } = await sb.from('users').select('*').eq('username', u).eq('password', p).single();
            if(data) {
                sessionUser = data;
                localStorage.setItem('swit_session', JSON.stringify(data));
                loadUI();
            } else {
                alert("Date de logare incorecte!");
            }
        }
    }

    function loadUI() {
        if(!sessionUser) return;
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('profileScreen').style.display = 'block';
        
        document.getElementById('welcomeTxt').innerText = "Profil: " + sessionUser.username;
        document.getElementById('d-fivem-name').innerText = sessionUser.fivem_name || "Nespecificat";
        document.getElementById('d-fivem-id').innerText = "#" + (sessionUser.fivem_id || "0");
        document.getElementById('d-money').innerText = (sessionUser.cash || 0) + " / " + (sessionUser.bank || 0);
        document.getElementById('d-discord').innerText = sessionUser.discord_id || "Neconectat";
        document.getElementById('d-ip').innerText = sessionUser.ip_address || "Detecting...";
        document.getElementById('d-hwid').innerText = sessionUser.hwid || "N/A";

        if(sessionUser.discord_id) document.getElementById('discordBtn').style.display = 'none';
    }

    function linkDiscord() {
        const redirect = encodeURIComponent(window.location.origin + window.location.pathname);
        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirect}&response_type=token&scope=identify`;
    }

    async function handleDiscordCallback() {
        const hash = new URLSearchParams(window.location.hash.slice(1));
        const token = hash.get('access_token');
        if(token && sessionUser) {
            const r = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
            const dData = await r.json();
            
            const { error } = await sb.from('users').update({ discord_id: dData.id }).eq('id', sessionUser.id);
            if(!error) {
                alert("Discord conectat!");
                sessionUser.discord_id = dData.id;
                localStorage.setItem('swit_session', JSON.stringify(sessionUser));
                window.history.replaceState({}, "", "/");
                loadUI();
            }
        }
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    window.onload = () => {
        const saved = localStorage.getItem('swit_session');
        if(saved) {
            sessionUser = JSON.parse(saved);
            loadUI();
        }
        handleDiscordCallback();
    };
</script>
</body>
</html>
