<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Swit RP | Management Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #0084ff; --red: #ff4757; --bg: #0a0f1d; }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; }
        
        .nav { background: rgba(0,0,0,0.5); padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .container { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #161e2d; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #1e293b; transition: 0.2s; }
        .card:hover { border-color: var(--blue); transform: translateY(-3px); }
        .card img { width: 70px; border-radius: 50%; margin-bottom: 10px; }

        /* Tags */
        .tag { font-size: 0.7rem; font-weight: 800; padding: 5px 10px; border-radius: 5px; text-transform: uppercase; }
        .fondator { background: var(--red); }
        .user { background: #334155; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #161e2d; padding: 40px; border-radius: 20px; width: 450px; text-align: center; border: 1px solid #334155; }
        
        /* Admin Section */
        .admin-zone { background: rgba(255, 71, 87, 0.1); border: 1px dashed var(--red); padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; font-size: 0.8rem; }
        
        input { width: 100%; padding: 12px; border-radius: 10px; background: #0a0f1d; border: 1px solid #334155; color: white; margin-bottom: 20px; }
        .btn { background: var(--blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 800; }
    </style>
</head>
<body>

<div class="nav">
    <div style="font-weight: 800; font-size: 1.5rem;">SWIT <span style="color:var(--blue)">RP</span></div>
    <div id="userInfo"><button class="btn" onclick="login()">LOGIN DISCORD</button></div>
</div>

<div class="container">
    <input type="text" id="search" placeholder="Caută jucător (Nume Discord)..." onkeyup="search()">
    <div class="grid" id="playerGrid"></div>
</div>

<div id="profileModal" class="modal" onclick="if(event.target == this) this.style.display='none'">
    <div class="modal-content">
        <img id="m-avatar" src="" style="width:100px; border-radius:50%;">
        <h2 id="m-name">Nume</h2>
        <div id="m-tag" class="tag">USER</div>
        
        <div id="m-admin" class="admin-zone" style="display:none;">
            <p style="color:var(--red); font-weight:800;">DETALII FONDATOR:</p>
            <p>IP: <span id="m-ip">0.0.0.0</span></p>
            <p>HWID: <span id="m-hwid">N/A</span></p>
            <p>Notă: <textarea id="m-note" style="width:100%; background:none; color:white; border:1px solid #334155; margin-top:5px;"></textarea></p>
            <button class="btn" style="background:var(--red); width:100%; margin-top:10px;" onclick="saveNote()">SALVEAZĂ</button>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://xdbdgfnrpglcqsguvcrz.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkYmRnZm5ycGdsY3FzZ3V2Y3J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyOTc2OTMsImV4cCI6MjA4Nzg3MzY5M30.NWjbjlP2p3wf0XmaEI2HjlgaIR3WNBYhkA5qvquv3aQ';
    const OWNER_ID = '1444054508484169728';
    const CLIENT_ID = '1475937365087486022';

    const sb = supabase.createClient(S_URL, S_KEY);
    let me = null;
    let viewingId = null;

    async function checkAuth() {
        const hash = new URLSearchParams(window.location.hash.slice(1));
        const token = hash.get('access_token') || localStorage.getItem('sb_token');

        if (token) {
            localStorage.setItem('sb_token', token);
            window.history.replaceState({}, "", "/");
            const r = await fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` } });
            if (r.ok) {
                me = await r.json();
                document.getElementById('userInfo').innerHTML = `<b>${me.username}</b>`;
                
                // Luam IP-ul jucatorului
                const ipObj = await fetch('https://api.ipify.org?format=json').then(res => res.json());

                // Salvam in baza de date
                await sb.from('profiles').upsert({
                    discord_id: me.id,
                    username: me.username,
                    avatar: `https://cdn.discordapp.com/avatars/${me.id}/${me.avatar}.png`,
                    ip_address: ipObj.ip,
                    rank: (me.id === OWNER_ID) ? 'Fondator' : 'User'
                });
            }
        }
    }

    function login() {
        const uri = encodeURIComponent(window.location.origin + window.location.pathname);
        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${uri}&response_type=token&scope=identify`;
    }

    async function search() {
        const val = document.getElementById('search').value;
        if (val.length < 2) return;
        const { data } = await sb.from('profiles').select('*').ilike('username', `%${val}%`);
        const grid = document.getElementById('playerGrid');
        grid.innerHTML = '';
        data.forEach(p => {
            grid.innerHTML += `
                <div class="card" onclick="viewProfile('${p.discord_id}')">
                    <img src="${p.avatar}">
                    <div style="font-weight:800;">${p.username}</div>
                    <span class="tag ${p.rank.toLowerCase()}">${p.rank}</span>
                </div>`;
        });
    }

    async function viewProfile(id) {
        viewingId = id;
        const { data: p } = await sb.from('profiles').select('*').eq('discord_id', id).single();
        document.getElementById('m-avatar').src = p.avatar;
        document.getElementById('m-name').innerText = p.username;
        document.getElementById('m-tag').innerText = p.rank;
        document.getElementById('m-tag').className = 'tag ' + p.rank.toLowerCase();

        // Daca esti fondator, vezi zona de admin
        if (me && me.id === OWNER_ID) {
            document.getElementById('m-admin').style.display = 'block';
            document.getElementById('m-ip').innerText = p.ip_address;
            document.getElementById('m-hwid').innerText = p.hwid;
            document.getElementById('m-note').value = p.admin_note;
        } else {
            document.getElementById('m-admin').style.display = 'none';
        }
        document.getElementById('profileModal').style.display = 'flex';
    }

    async function saveNote() {
        const note = document.getElementById('m-note').value;
        await sb.from('profiles').update({ admin_note: note }).eq('discord_id', viewingId);
        alert("Salvat!");
    }

    window.onload = checkAuth;
</script>
</body>
</html>
