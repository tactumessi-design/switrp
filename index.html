<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swit RP | Advanced Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --blue: #0084ff; --bg: #020617; --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08); --red: #ff4757; --green: #22c55e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: white; overflow-x: hidden; }
        
        .nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(2, 6, 23, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; text-decoration: none; color: white; }
        .logo span { color: var(--blue); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* Search Area */
        .search-box { width: 100%; position: relative; margin-bottom: 40px; }
        .search-box input { width: 100%; padding: 18px 25px; border-radius: 15px; background: var(--glass); border: 1px solid var(--border); color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--blue); box-shadow: 0 0 20px rgba(0, 132, 255, 0.1); }

        /* Grid Jucatori */
        .players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .player-card { background: var(--glass); border: 1px solid var(--border); padding: 25px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
        .player-card:hover { transform: translateY(-5px); border-color: var(--blue); }
        .player-card img { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--blue); margin-bottom: 15px; }

        /* Badges */
        .tag { font-size: 0.7rem; font-weight: 800; padding: 4px 12px; border-radius: 8px; text-transform: uppercase; margin: 3px; display: inline-block; }
        .fondator { background: var(--red); box-shadow: 0 0 15px rgba(255, 71, 87, 0.3); }
        .staff { background: var(--green); }
        .vip { background: #f1c40f; color: black; }
        .faction { background: var(--blue); }

        /* Modal Profil */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal-content { background: #0b0f1a; border: 1px solid var(--border); border-radius: 30px; width: 100%; max-width: 500px; padding: 40px; position: relative; text-align: center; }
        .admin-section { background: rgba(255, 71, 87, 0.05); border: 1px dashed var(--red); padding: 20px; border-radius: 15px; margin-top: 25px; text-align: left; }
        
        .btn-discord { background: #5865F2; color: white; padding: 12px 25px; border-radius: 12px; text-decoration: none; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; }
        .btn-discord:hover { opacity: 0.9; transform: translateY(-2px); }
        
        textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: white; padding: 10px; margin-top: 10px; resize: none; }
    </style>
</head>
<body>

<nav class="nav">
    <a href="#" class="logo">SWIT <span>RP</span></a>
    <div id="authArea">
        <button class="btn-discord" onclick="login()">LOGIN DISCORD</button>
    </div>
</nav>

<div class="container">
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Caută jucător după numele de Discord..." onkeyup="searchPlayers(this.value)">
    </div>

    <div class="players-grid" id="playersGrid">
        </div>
</div>

<div id="profileModal" class="modal" onclick="if(event.target == this) closeModal()">
    <div class="modal-content">
        <img id="p-avatar" src="" style="width: 120px; border-radius: 50%; border: 4px solid var(--blue); margin-bottom: 20px;">
        <h2 id="p-username">Nume</h2>
        <p id="p-id" style="color: #64748b; font-size: 0.8rem; margin-bottom: 15px;">ID: 0</p>
        
        <div id="p-tags"></div>

        <div id="adminPanel" class="admin-section" style="display: none;">
            <p style="color: var(--red); font-weight: 800; margin-bottom: 10px; font-size: 0.7rem;">ADMINISTRATOR ACCESS</p>
            <p><strong>IP:</strong> <span id="p-ip">0.0.0.0</span></p>
            <p><strong>HWID:</strong> <span id="p-hwid">N/A</span></p>
            <p><strong>Conturi:</strong> <span id="p-accounts">Nespecificat</span></p>
            <p style="margin-top: 15px;"><strong>Notiță Staff:</strong></p>
            <textarea id="p-note" rows="3"></textarea>
            <button onclick="saveAdminNote()" style="width: 100%; padding: 10px; background: var(--red); border: none; border-radius: 8px; color: white; font-weight: 700; margin-top: 10px; cursor: pointer;">SALVEAZĂ NOTIȚĂ</button>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://xdbdgfnrpglcqsguvcrz.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Pune cheia ta întreagă aici
    const CLIENT_ID = '1475937365087486022';
    const OWNER_ID = '1444054508484169728';

    const sb = supabase.createClient(S_URL, S_KEY);
    let me = null;
    let selectedPlayerId = null;

    // --- AUTH LOGIC ---
    function login() {
        const redirect = encodeURIComponent(window.location.origin + window.location.pathname);
        window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${redirect}&response_type=token&scope=identify`;
    }

    async function checkUser() {
        const hash = new URLSearchParams(window.location.hash.slice(1));
        let token = hash.get('access_token') || localStorage.getItem('d_token');

        if (token) {
            localStorage.setItem('d_token', token);
            window.history.replaceState({}, document.title, "/");
            
            const r = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
            if (r.ok) {
                me = await r.json();
                document.getElementById('authArea').innerHTML = `<span style="font-weight:700">${me.username}</span>`;
                
                // Luăm IP-ul automat
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();

                await sb.from('profiles').upsert({
                    discord_id: me.id,
                    username: me.username,
                    avatar: `https://cdn.discordapp.com/avatars/${me.id}/${me.avatar}.png`,
                    ip_address: ipData.ip,
                    rank: (me.id === OWNER_ID) ? 'Fondator' : 'User'
                }, { onConflict: 'discord_id' });
            }
        }
    }

    // --- PLAYERS LOGIC ---
    async function searchPlayers(val) {
        if (val.length < 2) return;
        const { data } = await sb.from('profiles').select('*').ilike('username', `%${val}%`);
        const grid = document.getElementById('playersGrid');
        grid.innerHTML = '';
        data.forEach(p => {
            grid.innerHTML += `
                <div class="player-card" onclick="viewProfile('${p.discord_id}')">
                    <img src="${p.avatar}">
                    <h3>${p.username}</h3>
                    <div class="tag ${p.rank.toLowerCase()}">${p.rank}</div>
                </div>`;
        });
    }

    async function viewProfile(id) {
        selectedPlayerId = id;
        const { data: p } = await sb.from('profiles').select('*').eq('discord_id', id).single();
        
        document.getElementById('p-avatar').src = p.avatar;
        document.getElementById('p-username').innerText = p.username;
        document.getElementById('p-id').innerText = "DISCORD ID: " + p.discord_id;
        
        const tags = document.getElementById('p-tags');
        tags.innerHTML = `<span class="tag ${p.rank.toLowerCase()}">${p.rank}</span>`;
        if(p.faction) tags.innerHTML += `<span class="tag faction">${p.faction}</span>`;

        // Vizibilitate Fondator
        const adminPanel = document.getElementById('adminPanel');
        if (me && me.id === OWNER_ID) {
            adminPanel.style.display = 'block';
            document.getElementById('p-ip').innerText = p.ip_address || 'Necunoscut';
            document.getElementById('p-hwid').innerText = p.hwid || 'N/A';
            document.getElementById('p-accounts').innerText = p.linked_accounts || 'Niciunul';
            document.getElementById('p-note').value = p.admin_note || '';
        } else {
            adminPanel.style.display = 'none';
        }

        document.getElementById('profileModal').style.display = 'flex';
    }

    async function saveAdminNote() {
        const note = document.getElementById('p-note').value;
        await sb.from('profiles').update({ admin_note: note }).eq('discord_id', selectedPlayerId);
        alert("Notiță salvată cu succes!");
    }

    function closeModal() { document.getElementById('profileModal').style.display = 'none'; }

    window.onload = checkUser;
</script>
</body>
</html>
